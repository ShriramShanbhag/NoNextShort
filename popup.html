<!DOCTYPE html>
<html>
<head>
  <title>ShortStop</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
      width: 200px;
    }

    h2 {
      font-size: 22px;
      color: grey;
      align-self: end;
      margin: 0px;

    }
    .toggle-btn {
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgb(37, 99, 235);
      background-color: transparent;
      color: rgb(37, 99, 235);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 10px 0px;
      width: -webkit-fill-available;
    }

    .toggle-btn:not(.disabled) {
        box-shadow: none;
        border: 1px solid #ccc;
        color: #000000;
    }

    .toggle-btn:not(.disabled):hover {
        border: 1px solid #aaa;
    }

    .toggle-btn.disabled {
        box-shadow: 0 0 2px 2px rgba(44, 73, 201, 0.4); /* green glow */
    }
    .header {
      display: flex;
      gap: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="logo">
    <h2>NoNextShort</h2>
  </div>
  <hr>
  <button id="globalEnableDisable" class="toggle-btn"></button>
  <script src="popup.js"></script>
</body>
</html>
